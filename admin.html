<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-container">

  <h1>Admin Panel</h1>

  <section class="section">
    <h2>Profile Settings</h2>

    <input id="name" placeholder="Name">
    <input id="username" placeholder="@username">
    <textarea id="description" placeholder="Description"></textarea>
    <input id="avatar" type="file">
    <input id="messageLink" placeholder="Leave a message link">

    <button onclick="saveProfile()">Save Profile</button>
  </section>

  <section class="section">
    <h2>Extra Button</h2>

    <input id="buttonText" placeholder="Button text">
    <input id="buttonLink" placeholder="Button link">

    <button onclick="saveButton()">Add Button</button>
  </section>

  <section class="section">
    <h2>Create Post</h2>

    <textarea id="postText" placeholder="Write your post"></textarea>
    <input id="media" type="file">

    <button onclick="publishPost()">Publish</button>
  </section>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
