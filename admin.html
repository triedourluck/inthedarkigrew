<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-box">

<h2>Profile</h2>

<input id="name" placeholder="Name">
<input id="username" placeholder="Username">
<textarea id="description" placeholder="Description"></textarea>
<input type="file" id="avatar">

<h2>Links</h2>

<input id="buttonName" placeholder="Button name">
<input id="buttonLink" placeholder="Button link">

<h2>Create Post</h2>

<textarea id="postText" placeholder="Write something..."></textarea>
<input type="file" id="postFile">

<h2>Appearance</h2>

<input id="bgColor" placeholder="Background color (#ffffff)">
<input type="file" id="bgImage">
<input id="fontFamily" placeholder="Font family">

<button id="save">Save Everything</button>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
