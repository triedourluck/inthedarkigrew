<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin</title>

<link rel="stylesheet" href="/inthedarkigrew/admin.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

<div class="admin-container">

    <h1>HELLO TEST 999</h1>

    <!-- PROFILE -->

    <div class="section">

        <h2>Profile</h2>

        <input id="nameInput" placeholder="Your name">

        <input id="usernameInput" placeholder="@username">

        <textarea id="descriptionInput" placeholder="Description"></textarea>

        <input id="avatarInput" type="file">

        <input id="messageLinkInput" placeholder="Leave message link">

        <button id="saveProfile" onclick="alert('html button works')">Save</button>

    </div>

    <!-- CREATE POST -->

    <div class="section">

        <h2>Create Post</h2>

        <textarea id="postText" placeholder="Write something..."></textarea>

        <input type="file" id="postFile" multiple>

        <button id="publishPost">Post</button>

    </div>

    <!-- POSTS LIST -->

    <div class="section">

        <h2>Published Posts</h2>

        <div id="adminPosts"></div>

    </div>

</div>

<script type="module" src="/inthedarkigrew/admin.js"></script>

</body>

</html>
