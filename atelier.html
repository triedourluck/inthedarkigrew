<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>atelier</title>

<style>
body {
  margin: 0;
  padding: 40px;
  font-family: 'Inter', sans-serif;
  background: white;
  color: black;
}

.container {
  max-width: 700px;
  margin: auto;
}

section {
  margin-bottom: 50px;
}

textarea,
input[type="text"],
input[type="file"] {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
  box-sizing: border-box;
}

textarea {
  min-height: 180px;
  resize: vertical;
}

button {
  margin-top: 15px;
  padding: 12px 24px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.preview {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.preview img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.status {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">

<section>
<h2>Configuración visual</h2>

<input type="text" id="name" placeholder="your name">
<input type="text" id="username" placeholder="@username">
<input type="text" id="description" placeholder="description">
<input type="text" id="buttonLink" placeholder="leave a message link">
<input type="file" id="avatarInput" accept="image/*">

<button id="saveProfile">Guardar perfil</button>
</section>

<section>
<h2>Nuevo post</h2>

<textarea id="postText" placeholder="Escribe aquí..."></textarea>
<input type="text" id="tagInput" placeholder="tag">

<input type="file" id="imageInput" multiple accept="image/*">

<div class="preview" id="preview"></div>

<button id="publishBtn">Publicar</button>

<div class="status" id="status"></div>
</section>

</div>

<script type="module">
import { db, storage } from "./firebase-config.js";

import {
  doc,
  setDoc,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

let selectedFiles = [];
let avatarFile = null;

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", () => {
  selectedFiles = Array.from(imageInput.files).slice(0, 9);

  preview.innerHTML = "";

  selectedFiles.forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

document.getElementById("avatarInput").addEventListener("change", e => {
  avatarFile = e.target.files[0];
});

document.getElementById("saveProfile").addEventListener("click", async () => {
  try {
    let avatarURL = "";

    if (avatarFile) {
      const avatarRef = ref(storage, `avatar/${Date.now()}_${avatarFile.name}`);
      await uploadBytes(avatarRef, avatarFile);
      avatarURL = await getDownloadURL(avatarRef);
    }

    await setDoc(doc(db, "profile", "main"), {
      name: document.getElementById("name").value,
      username: document.getElementById("username").value,
      description: document.getElementById("description").value,
      buttonLink: document.getElementById("buttonLink").value,
      buttonName: "Leave a message",
      avatarURL
    });

    alert("Perfil guardado");
  } catch (error) {
    console.error(error);
    alert("Error guardando perfil");
  }
});

document.getElementById("publishBtn").addEventListener("click", async () => {
  try {
    const text = document.getElementById("postText").value.trim();
    const tag = document.getElementById("tagInput").value.trim().toLowerCase();
    const status = document.getElementById("status");

    let imageUrls = [];

    for (let file of selectedFiles) {
      const storageRef = ref(storage, `posts/${Date.now()}_${file.name}`);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);
      imageUrls.push(url);
    }

    await addDoc(collection(db, "posts"), {
      text,
      tag,
      images: imageUrls,
      createdAt: serverTimestamp()
    });

    status.textContent = "Publicado.";

    document.getElementById("postText").value = "";
    document.getElementById("tagInput").value = "";
    preview.innerHTML = "";
    selectedFiles = [];

  } catch (error) {
    console.error(error);
    document.getElementById("status").textContent = "Error al publicar";
  }
});
</script>

</body>
</html>
