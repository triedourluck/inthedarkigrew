<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>atelier</title>

<style>
body {
  margin: 0;
  padding: 40px;
  font-family: 'Inter', sans-serif;
  background: white;
  color: black;
}

.container {
  max-width: 700px;
  margin: auto;
}

textarea {
  width: 100%;
  min-height: 180px;
  padding: 15px;
  font-size: 15px;
  border: 1px solid #ddd;
  resize: vertical;
  outline: none;
}

input[type="text"] {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border: 1px solid #ddd;
}

input[type="file"] {
  margin-top: 15px;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.preview {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.preview img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.status {
  margin-top: 20px;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">

<textarea id="postText" placeholder="Escribe aquí..."></textarea>

<input type="text" id="tagInput" placeholder="tag (ej: fashion)">

<input type="file" id="imageInput" multiple accept="image/*">

<div class="preview" id="preview"></div>

<button id="publishBtn">Publicar</button>

<div class="status" id="status"></div>

</div>

<script type="module">
import { db, storage } from "./firebase-config.js";

import {
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

let selectedFiles = [];

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", () => {
  selectedFiles = Array.from(imageInput.files).slice(0, 9);

  preview.innerHTML = "";

  selectedFiles.forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

document.getElementById("publishBtn").addEventListener("click", async () => {
  const text = document.getElementById("postText").value.trim();
  const tag = document.getElementById("tagInput").value.trim().toLowerCase();
  const status = document.getElementById("status");

  if (!text) {
    status.textContent = "Escribe algo primero.";
    return;
  }

  status.textContent = "Subiendo...";

  let imageUrls = [];

  for (let file of selectedFiles) {
    const storageRef = ref(storage, `posts/${Date.now()}_${file.name}`);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);
    imageUrls.push(url);
  }

  await addDoc(collection(db, "posts"), {
    text,
    tag,
    images: imageUrls,
    createdAt: serverTimestamp()
  });

  document.getElementById("postText").value = "";
  document.getElementById("tagInput").value = "";
  preview.innerHTML = "";
  selectedFiles = [];

  status.textContent = "Publicado.";
});
</script>

</body>
</html>
