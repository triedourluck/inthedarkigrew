<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier | The Quiet Club</title>

<style>
body {
  margin: 0;
  padding: 50px 24px;
  font-family: 'Inter', sans-serif;
  background: white;
  color: black;
}

.container {
  max-width: 620px;
  margin: auto;
}

section {
  margin-bottom: 60px;
}

h2 {
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 18px;
}

textarea,
input[type="text"],
input[type="file"] {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
  box-sizing: border-box;
}

textarea {
  min-height: 180px;
  resize: vertical;
}

button {
  margin-top: 15px;
  padding: 12px 24px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.profile-actions{
  display:flex;
  justify-content:space-between;
  gap:12px;
}

.profile-actions button{
  flex:1;
  min-width:0;
}

.preview {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.preview img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.avatar-preview {
  margin-top: 15px;
}

.avatar-preview img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
}

.status {
  margin-top: 15px;
  font-size: 14px;
}

.post-item {
  border: 1px solid #ddd;
  padding: 14px;
  margin-top: 12px;
}

.post-item button {
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">

<section>
<h2>Configuración visual</h2>

<input type="text" id="username" placeholder="@username">
<input type="text" id="description" placeholder="description">
<input type="text" id="buttonLink" placeholder="leave a message link">
<input type="file" id="avatarInput" accept="image/*">

<div class="avatar-preview" id="avatarPreview"></div>

<div class="profile-actions">
  <button id="saveProfile">Guardar perfil</button>
  <button id="viewProfileBtn">Ver perfil</button>
  <button id="logoutBtn">Cerrar sesión</button>
</div>
</section>

<section>
<h2>Nuevo post</h2>

<input type="text" id="postTitle" placeholder="Title" style="
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ddd;
font-family:'Inter', sans-serif;
font-size:13px;
box-sizing:border-box;
">

<textarea id="postText" placeholder="Escribe aquí..."></textarea>
<input type="text" id="tagInput" placeholder="tag">

<div style="display:flex; align-items:center; gap:12px; margin-top:12px;">
  <input type="file" id="imageInput" multiple accept="image/*" style="flex:1;">

  <label style="font-size:13px; display:flex; align-items:center; gap:6px;">
    <input type="checkbox" id="showImages" checked>
    mostrar en perfil
  </label>
</div>

<div class="preview" id="preview"></div>

<button id="publishBtn">Publicar</button>

<div class="status" id="status"></div>
</section>

<section>
<h2>Posts publicados</h2>
<div id="postsList"></div>
</section>

</div>

<script type="module">
import { db, storage, auth } from "./firebase-config.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

import {
  doc,
  setDoc,
  getDoc,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  serverTimestamp,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

let selectedFiles = [];
let avatarFile = null;
let currentAvatarURL = "";
let currentUser;

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", () => {
  selectedFiles = Array.from(imageInput.files).slice(0, 9);

  preview.innerHTML = "";

  selectedFiles.forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

document.getElementById("avatarInput").addEventListener("change", e => {
  avatarFile = e.target.files[0];
});

async function loadProfile() {
  const profileSnap = await getDoc(doc(db, "users", currentUser.uid));

  if (profileSnap.exists()) {
    const data = profileSnap.data();

    document.getElementById("username").value = data.alias || "";
    document.getElementById("description").value = data.description || "";
    document.getElementById("buttonLink").value = data.buttonLink || "";

    if (data.avatarURL) {
      currentAvatarURL = data.avatarURL;
      document.getElementById("avatarPreview").innerHTML =
        `<img src="${data.avatarURL}">`;
    }
  }
}

document.getElementById("saveProfile").addEventListener("click", async () => {
  try {
    let avatarURL = currentAvatarURL;

    if (avatarFile) {
      const avatarRef = ref(storage, `avatar/${Date.now()}_${avatarFile.name}`);
      await uploadBytes(avatarRef, avatarFile);
      avatarURL = await getDownloadURL(avatarRef);
    }

    await setDoc(doc(db, "users", currentUser.uid), {
      name: "The Quiet Club",
      alias: document.getElementById("username").value,
      description: document.getElementById("description").value,
      buttonLink: document.getElementById("buttonLink").value,
      buttonName: "Leave a message",
      avatarURL
    });

    currentAvatarURL = avatarURL;

    alert("Perfil guardado");

  } catch (error) {
    console.error(error);
    alert("Error guardando perfil");
  }
});

document.getElementById("publishBtn").addEventListener("click", async () => {
  try {
    const text = document.getElementById("postText").value.trim();
    const title = document.getElementById("postTitle").value;
    const tag = document.getElementById("tagInput").value.trim().toLowerCase();
    const status = document.getElementById("status");

    let imageUrls = [];

const files = Array.from(document.getElementById("imageInput").files);

for (let file of files) {
  const storageRef = ref(storage, `posts/${Date.now()}_${file.name}`);
  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);
  imageUrls.push(url);
}

    await addDoc(collection(db, "posts"), {
  uid: currentUser.uid,
  title,
  text,
  tag,
  images: imageUrls,
  showImages: document.getElementById("showImages").checked,
  createdAt: serverTimestamp()
});

    status.textContent = "Publicado.";

    document.getElementById("postTitle").value = "";
    document.getElementById("postText").value = "";
    document.getElementById("tagInput").value = "";
    document.getElementById("showImages").checked = true;
    preview.innerHTML = "";
    selectedFiles = [];

    loadPosts();

  } catch (error) {
    console.error(error);
    document.getElementById("status").textContent = "Error al publicar";
  }
});

async function loadPosts() {
  const postsList = document.getElementById("postsList");
  postsList.innerHTML = "";

const postsQuery = query(
  collection(db, "posts"),
  where("uid", "==", currentUser.uid)
);

const snap = await getDocs(postsQuery);

  snap.forEach(docItem => {
    const div = document.createElement("div");
    div.className = "post-item";

    div.innerHTML = `
      <p>${docItem.data().text || "(sin texto)"}</p>
      <button data-id="${docItem.id}">Eliminar</button>
    `;

    div.querySelector("button").addEventListener("click", async () => {
      await deleteDoc(doc(db, "posts", docItem.id));
      loadPosts();
    });

    postsList.appendChild(div);
  });
}

onAuthStateChanged(auth, user => {
  if(user){
    currentUser = user;
    loadProfile();
    loadPosts();
  }
});
  
  document.getElementById("viewProfileBtn").addEventListener("click", () => {
  const username = document.getElementById("username").value.replace("@","").trim();

  if(username){
    window.open(`/user.html?alias=${username}`, "_blank");
  }
});
</script>

</body>
</html>
