<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier | The Quiet Club</title>

<style>
body {
  margin: 0;
  padding: 50px 24px;
  font-family: 'Inter', sans-serif;
  background: white;
  color: black;
}

.container {
  max-width: 620px;
  margin: auto;
}

section {
  margin-bottom: 60px;
}

h2 {
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 18px;
}

textarea,
input[type="text"],
input[type="password"],
input[type="file"] {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
  box-sizing: border-box;
}

textarea {
  min-height: 180px;
  resize: vertical;
}

button {
  margin-top: 15px;
  padding: 12px 24px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.profile-actions{
  display:flex;
  justify-content:space-between;
  gap:12px;
}

.profile-actions button{
  flex:1;
  min-width:0;
}

.preview {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.preview img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.status {
  margin-top: 15px;
  font-size: 14px;
}

.post-item {
  border: 1px solid #ddd;
  padding: 14px;
  margin-top: 12px;
}

.post-item button {
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">

<section>
<h2>Configuración visual</h2>

<input type="text" id="username" placeholder="@username">
<input type="text" id="description" placeholder="description">
<input type="text" id="buttonLink" placeholder="leave a message link">
<input type="file" id="avatarInput" accept="image/*">
<p style="font-size:12px;color:#666;margin:10px 0 4px 0;">
Preview de perfil
</p>
<input type="file" id="previewUpload" accept="image/*">
<button id="savePreviewBtn">Guardar preview</button>
<input type="text" id="shareLink" readonly>
<button id="copyShareBtn">Compártelo con preview</button>

<div class="profile-actions">
  <button id="saveProfile">Guardar perfil</button>
  <button id="viewProfileBtn">Ver perfil</button>
  <button id="logoutBtn">Cerrar sesión</button>
</div>
</section>

<section>
<h2>Nuevo post</h2>

<input type="text" id="postTitle" placeholder="Title" style="
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ddd;
font-family:'Inter', sans-serif;
font-size:13px;
box-sizing:border-box;
">

<textarea id="postText" placeholder="Escribe aquí..."></textarea>
<input type="text" id="tagInput" placeholder="tag">

<div style="display:flex; align-items:center; gap:12px; margin-top:12px;">
  <input type="file" id="imageInput" multiple accept="image/*" style="flex:1;">

  <label style="font-size:13px; display:flex; align-items:center; gap:6px;">
    <input type="checkbox" id="showImages" checked>
    mostrar en perfil
  </label>
</div>

<div class="preview" id="preview"></div>

<button id="publishBtn">Publicar</button>

<div class="status" id="status"></div>
</section>

<section>
<div class="profile-actions">
  <button id="togglePostsBtn">Ver posts</button>
</div>

<div id="postsList" style="display:none;"></div>
</section>

<section>
<h2>Contraseña</h2>

<input type="password" id="newPassword" placeholder="Nueva contraseña">
<input type="password" id="repeatPassword" placeholder="Repetir contraseña">

<button id="savePasswordBtn">Guardar contraseña</button>
</section>

<section>
<h2>Eliminar cuenta</h2>

<button id="deleteAccountBtn">Eliminar cuenta permanentemente</button>
</section>

</div>

<script type="module">
import { db, storage, auth } from "./firebase-config.js";

import {
  onAuthStateChanged,
signOut,
updatePassword,
deleteUser
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

import {
  doc,
  setDoc,
  getDoc,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  serverTimestamp,
  query,
  where,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

let selectedFiles = [];
let avatarFile = null;
let previewFile = null;
let currentAvatarURL = "";
let currentUser;

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", () => {
  selectedFiles = Array.from(imageInput.files).slice(0, 9);

  preview.innerHTML = "";

  selectedFiles.forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

document.getElementById("avatarInput").addEventListener("change", e => {
  avatarFile = e.target.files[0];
});

document.getElementById("previewUpload").addEventListener("change", e => {
  previewFile = e.target.files[0];
});

async function loadProfile() {
  const profileSnap = await getDoc(doc(db, "users", currentUser.uid));

  if (profileSnap.exists()) {
    const data = profileSnap.data();

    document.getElementById("username").value = data.alias || "";
    document.getElementById("description").value = data.description || "";
    document.getElementById("buttonLink").value = data.buttonLink || "";
if(data.alias){
  document.getElementById("shareLink").value =
    `https://share.thequietclub.site/api/share/user?alias=${data.alias}`;
}

    if (data.avatarURL) {
      currentAvatarURL = data.avatarURL;
      document.getElementById("avatarPreview").innerHTML =
        `<img src="${data.avatarURL}">`;
    }
  }
}

document.getElementById("saveProfile").addEventListener("click", async () => {
  try {
    let avatarURL = currentAvatarURL;

    if (avatarFile) {
      const avatarRef = ref(storage, `avatar/${Date.now()}_${avatarFile.name}`);
      await uploadBytes(avatarRef, avatarFile);
      avatarURL = await getDownloadURL(avatarRef);
    }

    const username = document.getElementById("username").value
      .replace("@","")
      .trim()
      .toLowerCase();

    const aliasQuery = query(
      collection(db, "users"),
      where("alias", "==", username)
    );

    const aliasSnap = await getDocs(aliasQuery);

    if (!aliasSnap.empty && aliasSnap.docs[0].id !== currentUser.uid) {
      alert("Ese username ya está en uso");
      return;
    }

    await setDoc(doc(db, "users", currentUser.uid), {
      name: "The Quiet Club",
      alias: username,
      description: document.getElementById("description").value,
      buttonLink: document.getElementById("buttonLink").value,
      buttonName: "Leave a message",
      avatarURL
    }, { merge:true });

    currentAvatarURL = avatarURL;

    alert("Perfil guardado");

  } catch (error) {
    console.error(error);
    alert("Error guardando perfil");
  }
});

document.getElementById("savePreviewBtn").addEventListener("click", async () => {
  try{
    if(!previewFile){
      alert("Primero sube una imagen");
      return;
    }

    const previewRef = ref(storage, `preview/${Date.now()}_${previewFile.name}`);
    await uploadBytes(previewRef, previewFile);

    const previewImage = await getDownloadURL(previewRef);

    await setDoc(doc(db,"users", currentUser.uid), {
      previewImage
    }, { merge:true });

    alert("Miniatura guardada");

  } catch(error){
    console.error(error);
    alert("Error guardando miniatura");
  }
});

document.getElementById("publishBtn").addEventListener("click", async () => {
  try {
    const text = document.getElementById("postText").value.trim();
    const title = document.getElementById("postTitle").value;
    const tag = document.getElementById("tagInput").value.trim().toLowerCase();
    const status = document.getElementById("status");

    let imageUrls = [];

const files = Array.from(document.getElementById("imageInput").files);

for (let file of files) {
  const storageRef = ref(storage, `posts/${Date.now()}_${file.name}`);
  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);
  imageUrls.push(url);
}

let existingImages = [];
let oldDoc = null;

if(window.editingPostId){
  oldDoc = await getDoc(doc(db,"posts",window.editingPostId));
  existingImages = oldDoc.data().images || [];
}

    if(window.editingPostId){
  await setDoc(doc(db,"posts",window.editingPostId), {
    title,
    text,
    tag,
    images: imageUrls.length ? imageUrls : existingImages,
    showImages: document.getElementById("showImages").checked,
    uid: currentUser.uid,
    createdAt: oldDoc.data().createdAt
  });

  window.editingPostId = null;
loadPosts();
document.getElementById("postTitle").value = "";
document.getElementById("postText").value = "";
document.getElementById("tagInput").value = "";
preview.innerHTML = "";
document.getElementById("imageInput").value = "";

selectedFiles = [];
document.getElementById("status").textContent = "Post actualizado.";

return;
}
    
    await addDoc(collection(db, "posts"), {
  uid: currentUser.uid,
  title,
  text,
  tag,
  images: imageUrls,
  showImages: document.getElementById("showImages").checked,
  createdAt: serverTimestamp()
});

    status.textContent = "Publicado.";

document.getElementById("postTitle").value = "";
document.getElementById("postText").value = "";
document.getElementById("tagInput").value = "";
document.getElementById("showImages").checked = true;
preview.innerHTML = "";
document.getElementById("imageInput").value = "";
selectedFiles = [];

loadPosts();

  } catch (error) {
    console.error(error);
    document.getElementById("status").textContent = "Error al publicar";
  }
});

async function loadPosts() {
  const postsList = document.getElementById("postsList");
  postsList.innerHTML = "";

const postsQuery = query(
  collection(db, "posts"),
  where("uid", "==", currentUser.uid),
  orderBy("createdAt", "desc")
);

const snap = await getDocs(postsQuery);
const docs = snap.docs;

  docs.forEach(docItem => {
    const div = document.createElement("div");
    div.className = "post-item";

    div.innerHTML = `
      <p>${docItem.data().text || "(sin texto)"}</p>
      <button class="editBtn">Editar</button>
<button class="deleteBtn" data-id="${docItem.id}">Eliminar</button>
    `;
    
  const editBtn = div.querySelector(".editBtn");

editBtn.addEventListener("click", () => {
  document.getElementById("postText").value = docItem.data().text || "";
  document.getElementById("postTitle").value = docItem.data().title || "";
  document.getElementById("tagInput").value = docItem.data().tag || "";
document.getElementById("showImages").checked = docItem.data().showImages !== false;
  
  window.editingPostId = docItem.id;
});

    div.querySelector(".deleteBtn").addEventListener("click", async () => {
      await deleteDoc(doc(db, "posts", docItem.id));
      loadPosts();
    });

    postsList.appendChild(div);
  });
}

onAuthStateChanged(auth, user => {
  if(user){
    currentUser = user;
    loadProfile();
    loadPosts();
  } else {
    window.location.href = "/login.html";
  }
});
  
  document.getElementById("viewProfileBtn").addEventListener("click", () => {
  const username = document.getElementById("username").value.replace("@","").trim().toLowerCase();

  if(username){
    window.open(`/user.html?alias=${username}`, "_blank");
  }
});

document.getElementById("togglePostsBtn").addEventListener("click", () => {
  const posts = document.getElementById("postsList");

  if(posts.style.display === "none"){
    posts.style.display = "block";
  } else {
    posts.style.display = "none";
  }
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "/login.html";
});

document.getElementById("savePasswordBtn").addEventListener("click", async () => {
  const pass1 = document.getElementById("newPassword").value;
  const pass2 = document.getElementById("repeatPassword").value;

  if(pass1 !== pass2){
    alert("Las contraseñas no coinciden");
    return;
  }

  if(pass1.length < 6){
    alert("Mínimo 6 caracteres");
    return;
  }

  try {
    await updatePassword(currentUser, pass1);

    alert("Contraseña actualizada");

    document.getElementById("newPassword").value = "";
    document.getElementById("repeatPassword").value = "";

  } catch(error){
    console.error(error);
    alert("Error al cambiar contraseña");
  }
});

document.getElementById("deleteAccountBtn").addEventListener("click", async () => {
  const confirmDelete = confirm("Esta acción eliminará tu cuenta, perfil y posts permanentemente.");

  if (!confirmDelete) return;

  try {
    const postsQuery = query(
      collection(db, "posts"),
      where("uid", "==", currentUser.uid)
    );

    const snap = await getDocs(postsQuery);

    await deleteUser(currentUser);

for (const post of snap.docs) {
  await deleteDoc(doc(db, "posts", post.id));
}

await deleteDoc(doc(db, "users", currentUser.uid));

    alert("Cuenta eliminada");

    window.location.href = "/login.html";

  } catch (error) {
    console.error(error);
    alert("Error al eliminar cuenta");
  }
});

document.getElementById("copyShareBtn").addEventListener("click", async () => {
  try {
    const link = document.getElementById("shareLink").value;

    await navigator.clipboard.writeText(link);

    alert("Copiado");

  } catch(error){
    console.error(error);
    alert("No se pudo copiar");
  }
});

</script>

</body>
</html>
