<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quiet Club</title>
</head>
<body>

<h1 id="name"></h1>
<p id="alias"></p>
<p id="description"></p>
<div id="posts"></div>

<script type="module">
import { db } from "./firebase-config.js";

import {
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const alias = params.get("alias");

const userQuery = query(
  collection(db,"users"),
  where("alias","==",alias)
);

const userSnap = await getDocs(userQuery);

if(userSnap.size > 0){
  const userDoc = userSnap.docs[0];
  const userData = userDoc.data();
  const uid = userDoc.id;

  document.getElementById("name").textContent = userData.name;
  document.getElementById("alias").textContent = "@" + userData.alias;
  document.getElementById("description").textContent = userData.description || "";

  const postsQuery = query(
    collection(db,"posts"),
    where("uid","==",uid)
  );

  const postsSnap = await getDocs(postsQuery);

  postsSnap.forEach(post => {
    const div = document.createElement("div");
    div.innerHTML = `<p>${post.data().text}</p>`;
    document.getElementById("posts").appendChild(div);
  });
}
</script>

</body>
</html>
