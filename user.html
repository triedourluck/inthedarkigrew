<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quiet Club</title>
</head>
<body>

<h1 id="name"></h1>
<p id="alias"></p>
<p id="description"></p>
<div id="posts"></div>

<script type="module">
import { db } from "./firebase-config.js";

import {
  collection,
  getDocs,
  query,
  where,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const alias = params.get("alias");

async function loadSite(){

  const userQuery = query(
    collection(db,"users"),
    where("alias","==",alias)
  );

  const userSnap = await getDocs(userQuery);

  if(userSnap.empty) return;

  const userDoc = userSnap.docs[0];
  const userData = userDoc.data();
  const uid = userDoc.id;

  document.getElementById("profileName").textContent = userData.name || "your name";
  document.getElementById("profileUsername").textContent = "@" + (userData.alias || "");
  document.getElementById("profileDescription").textContent = userData.description || "";

  if(userData.avatarURL){
    document.getElementById("avatar").src = userData.avatarURL;
  }

  if(userData.buttonLink){
    document.getElementById("messageLink").href = userData.buttonLink;
  }

  const postsQuery = query(
    collection(db,"posts"),
    where("uid","==",uid)
  );

  const postsSnap = await getDocs(postsQuery);

  const postsContainer = document.getElementById("postsContainer");

  postsSnap.forEach(docItem => {

    const post = docItem.data();

    const div = document.createElement("div");
    div.className = "post-box";

    let imagesHTML = "";

    if(post.showImages !== false && post.images && post.images.length > 0){

      if(post.images.length === 1){
        imagesHTML = `
          <img src="${post.images[0]}" class="post-image single-image">
        `;
      } else {
        imagesHTML = `
          <div class="post-grid">
            ${post.images.map(url =>
              `<img src="${url}" class="post-image">`
            ).join("")}
          </div>
        `;
      }
    }

    let titleHTML = post.title ? `<p class="post-title">${post.title}</p>` : "";
    let tagHTML = post.tag ? `<p class="post-tag">#${post.tag}</p>` : "";

    div.innerHTML = `
      ${imagesHTML}
      ${titleHTML}
      <p class="post-text">${post.text || ""}</p>

      <div class="post-footer">
        ${tagHTML}

        <div class="post-menu">
          <button class="menu-btn">⋯</button>
          <div class="menu-dropdown">
            <button class="share-btn">Share</button>
          </div>
        </div>
      </div>
    `;

    const menuBtn = div.querySelector(".menu-btn");
    const postMenu = div.querySelector(".post-menu");
    const shareBtn = div.querySelector(".share-btn");

    menuBtn.addEventListener("click", () => {
      postMenu.classList.toggle("active");
    });

    shareBtn.addEventListener("click", async () => {
      const link = `https://thequietclub.site/api/share/post?id=${docItem.id}`;

      await navigator.clipboard.writeText(link);
      alert("Link copied");

      postMenu.classList.remove("active");
    });

    postsContainer.appendChild(div);
  });
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".post-menu")) {
    document.querySelectorAll(".post-menu").forEach(menu => {
      menu.classList.remove("active");
    });
  }
});

loadSite();
</script>

</body>
</html>
