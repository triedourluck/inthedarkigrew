<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quiet Club</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">

<style>
body{
  margin:0;
  background:#f6f6f4;
  font-family:'Inter', sans-serif;
  color:#222;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  text-align:center;
  max-width:520px;
  padding:24px;
}

.logo{
  width:320px;
  max-width:90%;
  margin-bottom:36px;
}

.subtitle{
  font-size:13px;
  color:#666;
  line-height:1.5;
  margin-bottom:42px;
}

.buttons{
  display:flex;
  flex-direction:column;
  gap:12px;
  max-width:220px;
  margin:0 auto;
}

.button{
  display:block;
  text-decoration:none;
  color:#222;
  background:white;
  padding:14px;
  font-size:13px;
  font-weight:500;
}

.button:hover{
  background:#ecece8;
}

@media(max-width:768px){
  .logo{
    width:260px;
  }

  .subtitle{
    font-size:12px;
  }
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <p class="subtitle">
    A quiet place for notes, fragments and personal archives.
  </p>

  <div class="buttons">
    <a href="login.html" class="button">Log in</a>
    <a href="signup.html" class="button">Sign up</a>
  </div>

</div>

</body>
</html>
