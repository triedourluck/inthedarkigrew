<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Space</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <div class="profile-card">
      <img src="https://via.placeholder.com/80" class="avatar">
      <h2 id="profileName">Your Name</h2>
      <p id="profileBio">Your description here.</p>
    </div>

    <nav>
      <a href="#">home</a>
      <a href="#">archive</a>
      <a href="#">about</a>
    </nav>
  </aside>

  <main class="feed">
    <div id="posts"></div>

    <section class="anonymous-box">
      <h3>Leave a message</h3>
      <textarea id="anonMessage" placeholder="Write something..."></textarea>
      <button onclick="sendMessage()">Send</button>
    </section>

    <section id="messages"></section>
  </main>

</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
