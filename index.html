<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quiet Club</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">

<style>
body{
  margin:0;
  background:#f6f6f4;
  font-family:'Inter', sans-serif;
  color:#222;
}

.layout{
  max-width:900px;
  margin:80px auto;
  display:grid;
  grid-template-columns:270px 520px;
  gap:50px;
  padding:0 24px;
}

.profile-column{
  width:270px;
}

.profile-card,
.description-card{
  width:270px;
  background:white;
  padding:18px;
  border-radius:0;
  margin-bottom:12px;
  box-sizing:border-box;
}

.profile-header{
  display:flex;
  align-items:center;
  gap:6px;
}

#avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  object-fit:cover;
  background:#ddd;
}

.profile-text h1{
  margin:0;
  font-family:'Playfair Display', serif;
  font-size:20px;
  line-height:1.05;
  white-space:nowrap;
}

#profileUsername{
  margin:2px 0 0 0;
  font-size:14px;
  color:#666;
  line-height:1.2;
}

#profileDescription{
  margin:0;
  font-size:13px;
  line-height:1.45;
}

.message-button{
  display:flex;
  align-items:center;
  gap:6px;
  margin-left:18px;
  font-size:12px;
  font-family:'Inter', sans-serif;
  font-weight:600;
  color:#666;
  text-decoration:none;
  padding-left:18px;
  margin-left:0;
}

.posts-column{
  display:flex;
  flex-direction:column;
  gap:24px;
  width:520px;
}

.post-box{
  background:white;
  padding:22px;
  border-radius:0;
  box-sizing:border-box;
}

.post-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
  width:96%;
  margin:0 auto 14px auto;
}

.post-image{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
}

.single-image{
  width:85%;
  display:block;
  margin:0 auto 14px auto;
  aspect-ratio:auto;
  height:auto;
  object-fit:cover;
}

.post-title{
  font-family:'Playfair Display', serif;
  font-size:18px;
  line-height:1.25;
  margin:0 0 10px 0;
  font-weight:400;
}

.post-text{
  font-family:'Inter', sans-serif;
  font-size:13px;
  line-height:1.45;
  margin:0;
  white-space:pre-line;
}

.post-tag{
  font-size:12px;
  color:#777;
  margin-top:10px;
}

.post-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
  position:relative;
}

.post-menu{
  position:relative;
}

.menu-btn{
  background:none;
  border:none;
  font-size:18px;
  color:#777;
  cursor:pointer;
  padding:0;
  line-height:1;
}

.menu-dropdown{
  display:none;
  position:absolute;
  right:0;
  bottom:24px;
  background:white;
  border:1px solid #eee;
  min-width:90px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  z-index:10;
}

.menu-dropdown button{
  width:100%;
  background:none;
  border:none;
  padding:8px 12px;
  font-size:12px;
  text-align:left;
  cursor:pointer;
  color:#444;
}

.menu-dropdown button:hover{
  background:#f7f7f7;
}

.post-menu.active .menu-dropdown{
  display:block;
}

@media(max-width:768px){

  .layout{
    grid-template-columns:1fr;
    gap:32px;
    margin:32px auto;
    padding:0 16px;
  }

  .profile-column{
    width:100%;
  }

  .profile-card,
  .description-card{
    width:100%;
  }

  .posts-column{
    width:100%;
  }

  .post-box{
    width:100%;
    padding:16px;
    box-sizing:border-box;
  }

  .profile-text h1{
    font-size:18px;
    white-space:normal;
  }

  #profileUsername{
    font-size:13px;
  }

  #profileDescription{
    font-size:13px;
    line-height:1.35;
  }

  .message-button{
    margin-left:0;
  }

  .post-grid{
    width:100%;
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
  }

  .post-image{
    width:100%;
    max-width:100%;
    height:auto;
    aspect-ratio:auto;
    display:block;
    object-fit:cover;
  }

}
</style>
</head>

<body>

<div class="layout">

  <div class="profile-column">

    <div class="profile-card">
      <div class="profile-header">
        <img id="avatar" src="https://firebasestorage.googleapis.com/v0/b/thequietclub-7265a.firebasestorage.app/o/avatar%2F1773649331526_b7c4cd37219574d3448099360cd91b55.jpg?alt=media&token=54cd5c88-1cfa-406c-af05-291b288e58f8">
        <div class="profile-text">
          <h1 id="profileName">The Quiet Club</h1>
          <p id="profileUsername">by Nina Saint Mleux</p>
        </div>
      </div>
    </div>

    <div class="description-card">
      <p id="profileDescription">Escribo por si algún día necesito recordar quién fui.</p>
    </div>

    <a id="messageLink" class="message-button" href="#" target="_blank">
    Leave a message ✉️
</a>

  </div>

  <div class="posts-column" id="postsContainer"></div>

</div>

<script type="module">
import { db } from "./firebase-config.js";

import {
  doc,
  getDoc,
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

async function loadSite(){

  const profileSnap = await getDoc(doc(db,"profile","main"));

  if(profileSnap.exists()){
    const data = profileSnap.data();

    document.getElementById("profileName").textContent = data.name || "your name";
    document.getElementById("profileUsername").textContent = data.username || "@username";
    document.getElementById("profileDescription").textContent = data.description || "";

    if(data.avatarURL){
      document.getElementById("avatar").src = data.avatarURL;
    }

    if(data.buttonLink){
      document.getElementById("messageLink").href = data.buttonLink;
    }
  }

  const postsQuery = query(collection(db,"posts"), orderBy("createdAt","desc"));
  const postsSnap = await getDocs(postsQuery);

  const postsContainer = document.getElementById("postsContainer");

  const params = new URLSearchParams(window.location.search);
const targetPost = params.get("post");

postsSnap.forEach(docItem => {

  if(targetPost && docItem.id !== targetPost) return;
    const post = docItem.data();

    const div = document.createElement("div");
    div.className = "post-box";

    let imagesHTML = "";

    if(post.showImages !== false && post.images && post.images.length > 0){

  if(post.images.length === 1){
    imagesHTML = `
      <img src="${post.images[0]}" class="post-image single-image">
    `;
  } else {
    imagesHTML = `
      <div class="post-grid">
        ${post.images.map(url =>
          `<img src="${url}" class="post-image">`
        ).join("")}
      </div>
    `;
  }

}
    let titleHTML = post.title ? `<p class="post-title">${post.title}</p>` : "";
    let tagHTML = post.tag ? `<p class="post-tag">#${post.tag}</p>` : "";

div.innerHTML = `
  ${imagesHTML}
  ${titleHTML}
  <p class="post-text">${post.text || ""}</p>

  
  <div class="post-footer">
  ${tagHTML}

  <div class="post-menu">
    <button class="menu-btn">⋯</button>
    <div class="menu-dropdown">
      <button class="share-btn">Share</button>
    </div>
  </div>
</div>
`;

const menuBtn = div.querySelector(".menu-btn");
const postMenu = div.querySelector(".post-menu");
const shareBtn = div.querySelector(".share-btn");

menuBtn.addEventListener("click", () => {
  postMenu.classList.toggle("active");
});

shareBtn.addEventListener("click", async () => {
  const link = `https://spontaneous-khapse-f57661.netlify.app/.netlify/functions/preview?id=${docItem.id}`;

  await navigator.clipboard.writeText(link);
  alert("Link copied");

  postMenu.classList.remove("active");
});

    postsContainer.appendChild(div);
  });
}

loadSite();
</script>

</body>
</html>
