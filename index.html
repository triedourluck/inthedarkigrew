<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Space</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <div class="profile-card">
      <img src="https://via.placeholder.com/80" class="avatar">

      <h2 id="profileName">Your Name</h2>
      <p id="profileBio">Your description here.</p>

      <a href="https://secreto.site" target="_blank" class="message-link">
        Leave a message
      </a>
    </div>
  </aside>

  <main class="feed">
    <div id="posts"></div>
  </main>

</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
