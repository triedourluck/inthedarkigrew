<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quiet Club</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f6f6f4;
  font-family:'Inter', sans-serif;
  color:#222;
}

.layout{
  max-width:900px;
  margin:80px auto;
  display:grid;
  grid-template-columns:270px 520px;
  gap:50px;
  padding:0 24px;
}

.profile-column{
  width:270px;
}

.profile-card,
.description-card{
  width:270px;
  background:white;
  padding:18px;
  border-radius:0;
  margin-bottom:12px;
  box-sizing:border-box;
}

.profile-header{
  display:flex;
  align-items:center;
  gap:6px;
}

#avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  object-fit:cover;
  background:#ddd;
}

.profile-text h1{
  margin:0;
  font-family:'Playfair Display', serif;
  font-size:20px;
  line-height:1.05;
  white-space:nowrap;
}

#profileUsername{
  margin:2px 0 0 0;
  font-size:14px;
  color:#666;
  line-height:1.2;
}

#profileDescription{
  margin:0;
  font-size:13px;
  line-height:1.45;
}

.message-button{
  display:block;
  margin-left:16px;
  font-size:12px;
  font-family:'Inter', sans-serif;
  font-weight:600;
  color:#666;
  text-decoration:none;
}

.posts-column{
  display:flex;
  flex-direction:column;
  gap:24px;
  width:520px;
}

.post-box{
  background:white;
  padding:22px;
  border-radius:0;
  box-sizing:border-box;
}

.post-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
  width:96%;
  margin:0 auto 14px auto;
}

.post-image{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
}

.post-text{
  font-family:'Inter', sans-serif;
  font-size:13px;
  line-height:1.45;
  margin:0;
  white-space:pre-line;
}

.post-tag{
  font-size:12px;
  color:#777;
  margin-top:10px;
}

@media(max-width:768px){

  .layout{
    grid-template-columns:1fr;
    gap:32px;
    margin:32px auto;
    padding:0 16px;
  }

  .profile-column{
    width:100%;
  }

  .profile-card,
  .description-card{
    width:100%;
  }

  .posts-column{
    width:100%;
  }

  .post-box{
    width:100%;
    padding:16px;
    box-sizing:border-box;
  }

  .profile-text h1{
    font-size:18px;
    white-space:normal;
  }

  #profileUsername{
    font-size:13px;
  }

  #profileDescription{
    font-size:13px;
    line-height:1.35;
  }

  .message-button{
    margin-left:0;
  }

  .post-grid{
    width:100%;
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
  }

  .post-image{
    width:100%;
    max-width:100%;
    height:auto;
    aspect-ratio:auto;
    display:block;
    object-fit:cover;
  }

}
</style>
</head>

<body>

<div class="layout">

  <div class="profile-column">

    <div class="profile-card">
      <div class="profile-header">
        <img id="avatar" src="">
        <div class="profile-text">
          <h1 id="profileName">your name</h1>
          <p id="profileUsername">@username</p>
        </div>
      </div>
    </div>

    <div class="description-card">
      <p id="profileDescription">your description here</p>
    </div>

    <a id="messageLink" class="message-button" href="#" target="_blank">
      Leave a message
    </a>

  </div>

  <div class="posts-column" id="postsContainer"></div>

</div>

<script type="module">
import { db } from "./firebase-config.js";

import {
  doc,
  getDoc,
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

async function loadSite(){

  const profileSnap = await getDoc(doc(db,"profile","main"));

  if(profileSnap.exists()){
    const data = profileSnap.data();

    document.getElementById("profileName").textContent = data.name || "your name";
    document.getElementById("profileUsername").textContent = data.username || "@username";
    document.getElementById("profileDescription").textContent = data.description || "";

    if(data.avatarURL){
      document.getElementById("avatar").src = data.avatarURL;
    }

    if(data.buttonLink){
      document.getElementById("messageLink").href = data.buttonLink;
    }
  }

  const postsQuery = query(collection(db,"posts"), orderBy("createdAt","desc"));
  const postsSnap = await getDocs(postsQuery);

  const postsContainer = document.getElementById("postsContainer");

  postsSnap.forEach(docItem => {
    const post = docItem.data();

    const div = document.createElement("div");
    div.className = "post-box";

    let imagesHTML = "";

    if(post.images && post.images.length > 0){
      imagesHTML = `
  <div class="post-grid">
    ${post.images.map(url =>
      `<img src="${url}" class="post-image">`
    ).join("")}
  </div>
`;
    }

    let tagHTML = post.tag ? `<p class="post-tag">#${post.tag}</p>` : "";

    div.innerHTML = `
      ${imagesHTML}
      <p class="post-text">${post.text || ""}</p>
      ${tagHTML}
    `;

    postsContainer.appendChild(div);
  });
}

loadSite();
</script>

</body>
</html>
