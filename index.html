<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quiet Club</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- LEFT PROFILE COLUMN -->

<div class="profile">

<div class="profile-header">

<img id="avatar" src="https://via.placeholder.com/80">

<div class="profile-text">

<h1 id="name">your name</h1>
<p id="username">@username</p>

</div>
</div>

<div class="bio-box">
<p id="description">your description here</p>
</div>

<a class="message-btn" href="#">Leave a message</a>

</div>


<!-- POSTS COLUMN -->

<div class="posts">

<div class="post">
<img src="https://picsum.photos/500/300">
</div>

<div class="post">
<p>Sometimes the smallest things take up the most room in your heart.</p>
</div>

</div>

</div>

</body>
</html>
