<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Quiet Club</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

<div class="layout">

    <!-- PROFILE COLUMN -->

    <div class="profile-column">

        <div class="profile-header">

            <img id="avatar" src="">

            <div class="profile-text">
                <h1 id="name">your name</h1>
                <p id="username">@username</p>
            </div>

        </div>

        <div class="bio-card">
            <p id="description">your description here</p>
        </div>

        <a class="message-button" id="messageLink" href="#" target="_blank">
        Leave a message
        </a>

    </div>

    <!-- POSTS COLUMN -->

    <div class="posts-column" id="posts">

    </div>

</div>

<script>

const savedName = localStorage.getItem("name");
const savedUsername = localStorage.getItem("username");
const savedDescription = localStorage.getItem("description");
const savedAvatar = localStorage.getItem("avatar");
const savedMessageLink = localStorage.getItem("messageLink");

if(savedName){
    document.getElementById("name").textContent = savedName;
}

if(savedUsername){
    document.getElementById("username").textContent = savedUsername;
}

if(savedDescription){
    document.getElementById("description").textContent = savedDescription;
}

if(savedAvatar){
    document.getElementById("avatar").src = savedAvatar;
}

if(savedMessageLink){
    document.getElementById("messageLink").href = savedMessageLink;
}

</script>

</body>

</html>
